<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOW DITHER</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="tab-bar"></div>
  <div id="canvas-wrap">
    <canvas id="dither-canvas"></canvas>
    <canvas id="overlay-canvas"></canvas>
  </div>

  <div id="panel">
    <div id="panel-header">
      <h1>Flow Dither</h1>
      <p class="panel-sub">Particle flow engine</p>
    </div>

    <div id="panel-scroll">

      <!-- ── Section 2: Canvas ──────────────────────────────────── -->
      <div class="panel-section">
        <div class="section-header">
          <span class="section-title">Canvas</span>
        </div>
        <div class="section-body">
          <div class="gr">
            <span>Size</span>
            <select id="canvas-size-sel">
              <option value="600x600" selected>600 &times; 600</option>
              <option value="800x800">800 &times; 800</option>
              <option value="1024x1024">1024 &times; 1024</option>
              <option value="800x600">800 &times; 600 (4:3)</option>
              <option value="1920x1080">1920 &times; 1080 (16:9)</option>
            </select>
          </div>
          <div class="gr">
            <span>BG</span>
            <input type="color" id="bg-color-picker" value="#000000">
            <input type="text" class="hex-input" id="bg-color-hex" value="#000000" maxlength="7" spellcheck="false">
          </div>
        </div>
      </div>
      <div class="panel-divider"></div>

      <!-- ── Section 3: Shapes ──────────────────────────────────── -->
      <div class="panel-section">
        <div class="section-header">
          <span class="section-title">Shapes</span>
          <button id="add-shape-btn" class="section-add-btn">+ Add</button>
        </div>
        <div class="section-body">
          <div id="shapes-list"></div>
          <div class="shape-selected-controls" style="display:none">
            <div class="gr">
              <span>X</span>
              <input id="pos-x-sl" type="range" min="-300" max="300" value="0" step="1">
              <span class="sv" id="pos-x-val">0</span>
            </div>
            <div class="gr">
              <span>Y</span>
              <input id="pos-y-sl" type="range" min="-300" max="300" value="0" step="1">
              <span class="sv" id="pos-y-val">0</span>
            </div>
            <div class="gr">
              <span>Scale</span>
              <input id="scale-sl" type="range" min="10" max="300" value="100" step="1">
              <span class="sv" id="scale-val">100%</span>
            </div>
            <div class="gr">
              <span>Rotate</span>
              <input id="rotate-sl" type="range" min="-180" max="180" value="0" step="1">
              <span class="sv" id="rotate-val">0&deg;</span>
            </div>
          </div>
        </div>
      </div>
      <div class="panel-divider shape-section"></div>

      <!-- ── Section 4: Nodes ──────────────────────────────────── -->
      <div class="panel-section shape-section">
        <div class="section-header">
          <span class="section-title">Nodes</span>
          <button id="add-btn" class="section-add-btn">+ Add</button>
        </div>
        <div class="section-body" id="nodes-list"></div>
      </div>
      <div class="panel-divider shape-section"></div>

      <!-- ── Section 5: Anchors ────────────────────────────────── -->
      <div class="panel-section shape-section">
        <div class="section-header">
          <span class="section-title">Anchors</span>
          <button id="add-anchor-btn" class="section-add-btn">+ Add</button>
        </div>
        <div class="section-body" id="anchors-list"></div>
      </div>
      <div class="panel-divider"></div>

      <!-- ── Section 6: Export ─────────────────────────────────── -->
      <div class="panel-section">
        <div class="section-body">
          <div class="export-btn-wrap">
            <div id="export-dropdown" class="export-dropdown" style="display:none">
              <div class="export-dropdown-item" data-mode="canvas">Export Canvas</div>
              <div class="export-dropdown-item" data-mode="shape">Export Shape</div>
            </div>
            <button id="export-btn">EXPORT</button>
          </div>
        </div>
      </div>

    </div>

    <div id="panel-footer">
      <div class="hint">
        <b>Space</b> pause &middot; <b>Del</b> remove &middot; <b>+/-</b> add/del<br>
        <b>Ctrl+Z</b> undo &middot; <b>Ctrl+Shift+Z</b> redo &middot; <b>Click ring</b> add node
      </div>
    </div>
  </div>

  <!-- Drop zone overlay (canvas area) -->
  <input type="file" id="file-input" accept=".svg">

  <!-- Export Modal -->
  <div id="export-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Export</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="export-group">
          <label>Format</label>
          <select id="export-format">
            <option value="png">PNG (current frame)</option>
            <option value="png-sequence">PNG Sequence</option>
            <option value="gif">Animated GIF</option>
          </select>
        </div>
        <div class="export-group">
          <label>Resolution</label>
          <select id="export-resolution">
            <option value="1">1x</option>
            <option value="2" selected>2x</option>
            <option value="4">4x</option>
          </select>
        </div>
        <div class="export-group">
          <label>Background</label>
          <select id="export-bg">
            <option value="black">Black</option>
            <option value="transparent">Transparent</option>
            <option value="custom">Custom Color</option>
          </select>
          <input type="color" id="export-bg-color" value="#000000" class="hidden">
        </div>
        <div class="export-group anim-options hidden">
          <label>Frames</label>
          <input type="number" id="export-frames" value="30" min="1" max="300">
          <label>Duration (s)</label>
          <input type="number" id="export-duration" value="2" min="0.1" max="30" step="0.1">
        </div>
        <div id="export-progress" class="hidden">
          <div class="progress-bar"><div class="progress-fill"></div></div>
          <span class="progress-text">0%</span>
        </div>
        <button id="export-go">Export</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
