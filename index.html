<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOW DITHER</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="canvas-wrap">
    <canvas id="dither-canvas"></canvas>
    <canvas id="overlay-canvas"></canvas>
  </div>

  <div id="panel">
    <div id="panel-header">
      <h1>Flow Dither</h1>
      <p class="panel-sub">Particle flow engine</p>
    </div>

    <div id="panel-scroll">

      <!-- ── Section: Shape ──────────────────────────────────── -->
      <div class="panel-section">
        <div class="section-header">
          <span class="section-title">Shape</span>
        </div>
        <div class="section-body">
          <div id="drop-zone">
            <button id="upload-btn">Upload SVG</button>
            <p class="drop-hint">or drag &amp; drop .svg file</p>
          </div>
          <input type="file" id="file-input" accept=".svg">

          <div id="dir-row">
            <button class="dir-btn active" data-dir="1">CCW</button>
            <button class="dir-btn" data-dir="-1">CW</button>
          </div>
          <div class="gr">
            <span>Fill</span>
            <input id="fill-sl" type="range" min="5" max="100" value="70">
            <span class="sv" id="fill-val">70%</span>
          </div>
          <div class="gr">
            <span>Speed</span>
            <input id="speed-sl" type="range" min="5" max="400" value="100">
            <span class="sv" id="speed-val">1.0x</span>
          </div>
          <div class="gr">
            <span>Grain</span>
            <input id="grain-sl" type="range" min="3" max="28" value="9" step="0.5">
            <span class="sv" id="grain-val">9</span>
          </div>
          <div class="gr">
            <span>Trail</span>
            <input id="stretch-sl" type="range" min="10" max="85" value="45" step="1">
            <span class="sv" id="stretch-val">45%</span>
          </div>
        </div>
      </div>

      <!-- ── Section: Nodes ──────────────────────────────────── -->
      <div class="panel-section">
        <div class="section-header">
          <span class="section-title">Nodes</span>
          <button id="add-btn" class="section-add-btn">+ Add</button>
        </div>
        <div class="section-body" id="nodes-list"></div>
      </div>

      <!-- ── Section: Anchors ────────────────────────────────── -->
      <div class="panel-section">
        <div class="section-header">
          <span class="section-title">Anchors</span>
          <button id="add-anchor-btn" class="section-add-btn">+ Add</button>
        </div>
        <div class="section-body" id="anchors-list"></div>
      </div>

      <!-- ── Section: Export ─────────────────────────────────── -->
      <div class="panel-section">
        <div class="section-header">
          <span class="section-title">Export</span>
        </div>
        <div class="section-body">
          <button id="export-btn">Export Image</button>
        </div>
      </div>

    </div>

    <div id="panel-footer">
      <div class="hint">
        <b>Space</b> pause &middot; <b>Del</b> remove &middot; <b>+/-</b> add/del<br>
        <b>Ctrl+Z</b> undo &middot; <b>Ctrl+Shift+Z</b> redo &middot; <b>Click ring</b> add node
      </div>
    </div>
  </div>

  <!-- Export Modal -->
  <div id="export-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Export</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="export-group">
          <label>Format</label>
          <select id="export-format">
            <option value="png">PNG (current frame)</option>
            <option value="png-sequence">PNG Sequence</option>
            <option value="gif">Animated GIF</option>
          </select>
        </div>
        <div class="export-group">
          <label>Resolution</label>
          <select id="export-resolution">
            <option value="1">1x (600x600)</option>
            <option value="2" selected>2x (1200x1200)</option>
            <option value="4">4x (2400x2400)</option>
          </select>
        </div>
        <div class="export-group">
          <label>Background</label>
          <select id="export-bg">
            <option value="black">Black</option>
            <option value="transparent">Transparent</option>
            <option value="custom">Custom Color</option>
          </select>
          <input type="color" id="export-bg-color" value="#000000" class="hidden">
        </div>
        <div class="export-group anim-options hidden">
          <label>Frames</label>
          <input type="number" id="export-frames" value="30" min="1" max="300">
          <label>Duration (s)</label>
          <input type="number" id="export-duration" value="2" min="0.1" max="30" step="0.1">
        </div>
        <div id="export-progress" class="hidden">
          <div class="progress-bar"><div class="progress-fill"></div></div>
          <span class="progress-text">0%</span>
        </div>
        <button id="export-go">Export</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
